<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Multimedia learn</title>
    </head>
    <body>
        <h1>Multimedia en HTML</h1>
        <!-- <h2>Audio</h2> -->
        <p><b>Audio</b></p>
        <audio controls loop autoplay>
            <source src="./carpMultimedia/audio.mp3" type="audio/mpeg">
            Audio mp3
        </audio>
        <!-- <h2>Video</h2> -->
        <p><b>Video</b></p>
        <video controls loop autoplay>
            <source src="./video1.mp4" type="video/mp4">
            Video mp4
        </video>
        <!-- <h2>Iframe</h2> -->
        <p><b>Video</b></p>
        <iframe width="560" height="315" src="https://www.youtube.com/embed/Or-GhD9nZkg?si=8yyJ6Hf2EftCGBis" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </body>
</html>
